        <div class="textbox">
            <br>
            <label>Jméno & příjmení: <input type="text" name="jmeno" id="jmeno" required placeholder="John Doe"></label> <br>
            <label>E-mail: <input type="email" name="e-mail" id="e-mail" required placeholder="example@exaple.com"></label><br>
            <label>Tel. Číslo: <input type="number" name="telefon" id="telefon" required minlength="9" placeholder="123456789"></label><br>
        </div>
        <label>Třída:
            <div class="trida">
                <label for="trida">Low</label>
                <label for="trida">Middle</label>
                <label for="trida">High</label>
                <label for="trida">Ultra</label>
                <input type="radio" name="trida" id="" value="low" required checked>
                <input type="radio" name="trida" id="" value="Middle" required>
                <input type="radio" name="trida" id="" value="High" required>
                <input type="radio" name="trida" id="" value="Ultra " required>
            </div>
        </label>
        <div class="datum">
        <label>Datum od: <input type="date" name="Od" id="Od"></label><br>
        <label>Datum do: <input type="date" name="Do" id="Do"></label><br>
        </div>

        <label class="odeslat"><input type="submit"></label>
